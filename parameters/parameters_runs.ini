[execution]
# mode can be: prepare_only, local, slurm.
mode = local
execute = true
solver = simpleFoam
n_processors = 6
parallel = auto
decompose = true
reconstruct = true
max_workers = 1
stop_on_error = true
shell_prefix =

[control]
start_time = 0
end_time = 1000
delta_t = 1
write_interval = 100
purge_write = 0

[slurm]
submit = false
partition =
account =
time = 02:00:00
nodes = 1
ntasks_per_node = 1
job_name_prefix = airfoil
