[base_case]
id = simpleFoam_airfoil
template_dir = base_cases/simpleFoam_airfoil

[domain]
# Values are auto-estimated from the exact STL when mesh_auto.estimate_from_stl=true.
# Bounds are expressed in chord lengths, then scaled by geometry.chord.
x_min = -5.0
x_max = 10.0
y_min = -5.0
y_max = 5.0
z_min = -0.10
z_max = 0.10
cells_x = 220
cells_y = 150
cells_z = 4

[snappy]
castellated_mesh = true
snap = true
add_layers = false
airfoil_patch = airfoil
location_in_mesh = 4.0 0.0 0.0
max_global_cells = 6000000
max_local_cells = 3000000
min_refinement_cells = 10
n_cells_between_levels = 4
surface_level_min = 5
surface_level_max = 6
feature_level = 6

[distance_refinement]
enabled = true
# Auto-estimated from the STL when mesh_auto.estimate_from_stl=true.
# Distance-to-airfoil refinement levels: distance_in_meters refinement_level.
levels = 0.02 8; 0.08 7; 0.25 6; 0.75 5

[mesh_estimation]
upstream_chords = 5.0
downstream_chords = 10.0
normal_chords = 5.0
span_padding_fraction = 0.5
base_cells_per_chord_x = 15.0
base_cells_per_chord_y = 15.0
base_cells_per_span = 4.0
location_downstream_chords = 3.0
near_distance_chords = 0.02
near_distance_edge_factor = 2.5
distance_multipliers = 1, 4, 12, 36
distance_levels = 8, 7, 6, 5
surface_level = 6

[local_refinement]
enabled = true
max_boxes = 16
max_new_boxes_per_attempt = 4
box_radius_chords = 0.04
box_radius_edge_factor = 8.0
min_level = 7
max_level = 9
boxes =

[snap]
n_smooth_patch = 5
tolerance = 2.0
n_solve_iter = 50
n_relax_iter = 8
n_feature_snap_iter = 15
implicit_feature_snap = false
explicit_feature_snap = true
multi_region_feature_snap = false

[layers]
relative_sizes = true
n_surface_layers = 3
expansion_ratio = 1.2
final_layer_thickness = 0.3
min_thickness = 0.08
n_grow = 0
feature_angle = 60
n_relax_iter = 5
n_smooth_surface_normals = 1
n_smooth_normals = 3
n_smooth_thickness = 10
max_face_thickness_ratio = 0.5
max_thickness_to_medial_ratio = 0.3
min_median_axis_angle = 90
n_buffer_cells_no_extrude = 0
n_layer_iter = 50

[mesh]
reference_case_name = _mesh_reference
force = false
execute = true
commands = blockMesh; surfaceFeatureExtract; snappyHexMesh -overwrite; checkMesh -allTopology -allGeometry -writeSets vtk

[mesh_auto]
enabled = true
estimate_from_stl = true
# 0 means unbounded adaptive attempts. Stop with Ctrl+C or when no useful adjustment remains.
max_attempts = 0
min_cells = 1000000
require_zero_failed_checks = true
max_cell_growth_per_attempt = 1.35
min_cells_z = 4
max_surface_level = 9
max_distance_level = 9
max_cells_between_levels = 6
max_n_smooth_patch = 12
max_n_solve_iter = 90
max_n_relax_iter = 25
max_global_cell_factor = 6.0
