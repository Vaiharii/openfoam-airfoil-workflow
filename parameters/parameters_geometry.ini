[airfoil]
# Supported today: naca4. The workflow is intentionally structured so that
# naca5, naca6, and custom databases can be added without changing main.py.
family = naca4
code = 4412
name = auto
source = database
database_root = airfoils/database
custom_dat_path =

[geometry]
chord = 1.0
span = 0.10

[output]
generated_dir = airfoils/generated
canonical_stl_name = geometry.stl
write_named_stl = true
copy_to_base_case = true
